<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
  :root {
    --primary: #56042e;
    --primary-light: #7a1a4a;
    --accent: #c8a415;
    --accent-light: #e8c835;
    --bg-dark: #0a0e1a;
    --bg-card: #131928;
    --bg-card-hover: #1a2238;
    --border: #1e2a42;
    --text: #e8e8e8;
    --text-muted: #8892a8;
    --green: #2ecc71;
    --orange: #e67e22;
    --red: #e74c3c;
    --live-pulse: #ff4757;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg-dark);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  .header {
    background: linear-gradient(135deg, var(--primary) 0%, #2d0118 50%, #0a0e1a 100%);
    padding: 14px 16px 10px;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 2px solid var(--accent);
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;
  }
  .header h1 {
    font-size: 19px; font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, var(--accent-light) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: 0.5px;
  }
  .trophy-icon { font-size: 26px; line-height: 1; }
  .header-sub {
    font-size: 11px; color: var(--text-muted);
    display: flex; align-items: center; gap: 6px;
  }
  .header-sub .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); display: inline-block;
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity:1; } 50% { opacity:0.4; }
  }
  .refresh-btn {
    background: none; border: 1.5px solid var(--border);
    color: var(--text-muted); padding: 5px 10px; border-radius: 8px;
    font-size: 11px; cursor: pointer;
    display: flex; align-items: center; gap: 3px; transition: all 0.2s;
  }
  .refresh-btn:active {
    background: rgba(200,164,21,0.1); border-color: var(--accent); color: var(--accent);
  }
  .refresh-btn.loading .icon { animation: spin 1s linear infinite; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  .tab-nav {
    display: flex; gap: 0; padding: 0 12px;
    background: var(--bg-dark); border-bottom: 1px solid var(--border);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; position: sticky; top: 64px; z-index: 99;
  }
  .tab-nav::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0; padding: 9px 12px; font-size: 12.5px; font-weight: 600;
    color: var(--text-muted); background: none; border: none;
    border-bottom: 2px solid transparent; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:active { transform: scale(0.95); }

  .content { padding: 10px 10px 76px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn {
    from { opacity:0; transform:translateY(6px); }
    to { opacity:1; transform:translateY(0); }
  }

  .save-hint {
    text-align: center; font-size: 11px; color: var(--text-muted);
    padding: 6px; margin-bottom: 8px;
  }

  .group-card {
    background: var(--bg-card); border-radius: 14px;
    margin-bottom: 14px; overflow: hidden; border: 1px solid var(--border);
  }
  .group-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    background: linear-gradient(135deg, rgba(86,4,46,0.4) 0%, rgba(86,4,46,0.1) 100%);
    border-bottom: 1px solid var(--border);
  }
  .group-label { font-size: 14px; font-weight: 700; color: var(--accent); }
  .group-teams { font-size: 11px; color: var(--text-muted); }

  .match-row {
    display: flex; align-items: center; padding: 7px 10px;
    border-bottom: 1px solid rgba(30,42,66,0.5);
    gap: 5px; min-height: 44px;
  }
  .match-row:last-child { border-bottom: none; }

  .match-time {
    font-size: 10px; color: var(--text-muted); text-align: center;
    min-width: 38px; flex-shrink: 0; line-height: 1.3;
  }
  .match-time .date { font-size: 11px; font-weight: 700; color: var(--text); display: block; }
  .match-time .kickoff { font-size: 10px; color: var(--accent); font-weight: 600; }

  .team-cell {
    flex: 1; display: flex; align-items: center; gap: 4px; min-width: 0;
  }
  .team-cell.right { flex-direction: row-reverse; text-align: right; }
  .team-flag { font-size: 20px; line-height: 1; flex-shrink: 0; }
  .team-name {
    font-size: 12px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .score-box {
    display: flex; align-items: center; gap: 2px; flex-shrink: 0;
  }
  .score-input {
    width: 24px; height: 24px; border-radius: 5px;
    border: 1.5px solid var(--border); background: rgba(255,255,255,0.05);
    color: var(--text); font-size: 12px; font-weight: 700;
    text-align: center; outline: none; transition: all 0.2s;
    -webkit-appearance: none; padding: 0; line-height: 24px;
  }
  .score-input:focus {
    border-color: var(--accent); background: rgba(200,164,21,0.1);
    box-shadow: 0 0 0 2px rgba(200,164,21,0.12);
  }
  .score-input.has-value {
    border-color: var(--accent); background: rgba(200,164,21,0.15);
    color: var(--accent-light);
  }
  .score-input.api-score {
    border-color: var(--green); background: rgba(46,204,113,0.12);
    color: var(--green); font-weight: 800; pointer-events: none;
  }
  .score-divider { color: var(--text-muted); font-size: 11px; font-weight: 300; }

  /* 比赛状态 */
  .status-upcoming { background: rgba(46,204,113,0.12); color: var(--green); }
  .status-finished { background: rgba(200,164,21,0.15); color: var(--accent); }
  .match-status {
    font-size: 9px; padding: 2px 5px; border-radius: 5px;
    font-weight: 600; flex-shrink: 0; text-align: center; min-width: 30px;
  }

  /* 积分榜 */
  .standings-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .standings-table th {
    padding: 7px 4px; text-align: center; color: var(--text-muted);
    font-weight: 600; font-size: 10px;
    border-bottom: 1px solid var(--border); background: rgba(86,4,46,0.15);
  }
  .standings-table th:first-child { text-align: left; padding-left: 10px; }
  .standings-table td {
    padding: 7px 4px; text-align: center;
    border-bottom: 1px solid rgba(30,42,66,0.3);
  }
  .standings-table td:first-child { text-align: left; padding-left: 10px; }
  .standings-table tr:last-child td { border-bottom: none; }
  .standings-team { display: flex; align-items: center; gap: 5px; }
  .standings-team .flag { font-size: 16px; }
  .standings-team .name { font-weight: 600; font-size: 11px; }
  .qualify-line { border-top: 1px dashed rgba(200,164,21,0.3); }
  .pos-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; border-radius: 50%;
    font-size: 9px; font-weight: 700;
  }
  .pos-1 { background: rgba(200,164,21,0.3); color: var(--accent); }
  .pos-2 { background: rgba(46,204,113,0.2); color: var(--green); }
  .pos-3,.pos-4 { background: rgba(255,255,255,0.05); color: var(--text-muted); }

  /* 底部导航 */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; background: rgba(10,14,26,0.95);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 5px 0; padding-bottom: calc(5px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1px;
    padding: 5px; border: none; background: none;
    color: var(--text-muted); font-size: 10px; cursor: pointer; transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn .icon { font-size: 18px; line-height: 1; }

  /* Toast */
  .toast {
    position: fixed; top: 74px; left: 50%;
    transform: translateX(-50%) translateY(-16px);
    background: var(--accent); color: var(--bg-dark);
    padding: 7px 18px; border-radius: 18px;
    font-size: 12px; font-weight: 700;
    opacity: 0; transition: all 0.3s ease; z-index: 200;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* 淘汰赛 */
  .bracket-round { margin-bottom: 18px; }
  .bracket-round-title {
    font-size: 13px; font-weight: 700; color: var(--accent);
    margin-bottom: 8px; padding-left: 4px;
  }
  .bracket-match {
    background: var(--bg-card); border-radius: 11px;
    margin-bottom: 6px; overflow: hidden; border: 1px solid var(--border);
  }
  .bracket-team {
    display: flex; align-items: center; padding: 8px 12px; gap: 6px;
    border-bottom: 1px solid rgba(30,42,66,0.3);
  }
  .bracket-team:last-child { border-bottom: none; }
  .bracket-team .flag { font-size: 18px; }
  .bracket-team .name { flex: 1; font-size: 12px; font-weight: 600; }
  .bracket-team .tbd { flex: 1; font-size: 12px; color: var(--text-muted); font-style: italic; }
  .bracket-score {
    width: 22px; height: 22px; border-radius: 5px;
    border: 1.5px solid var(--border); background: rgba(255,255,255,0.05);
    color: var(--text); font-size: 11px; font-weight: 700;
    text-align: center; outline: none; -webkit-appearance: none; padding: 0; line-height: 22px;
  }
  .bracket-score:focus { border-color: var(--accent); background: rgba(200,164,21,0.1); }
  .bracket-date {
    font-size: 10px; color: var(--text-muted); text-align: center;
    padding: 3px; background: rgba(86,4,46,0.15);
  }

  /* 信息卡片 */
  .info-card {
    background: linear-gradient(135deg, rgba(86,4,46,0.3) 0%, rgba(86,4,46,0.1) 100%);
    border: 1px solid rgba(200,164,21,0.2);
    border-radius: 14px; padding: 14px; margin-bottom: 14px;
  }
  .info-card h3 { font-size: 13px; color: var(--accent); margin-bottom: 6px; }
  .info-item {
    display: flex; justify-content: space-between; padding: 5px 0;
    font-size: 12px; border-bottom: 1px solid rgba(30,42,66,0.3);
  }
  .info-item:last-child { border-bottom: none; }
  .info-item .label { color: var(--text-muted); }
  .info-item .value { font-weight: 600; }

  /* 日期分组标题 */
  .date-title {
    font-size: 13px; font-weight: 700; color: var(--accent);
    padding: 10px 4px 6px; margin-top: 4px;
    border-bottom: 1px solid rgba(200,164,21,0.15); margin-bottom: 6px;
  }

  /* 时区提示 */
  .tz-hint {
    font-size: 10px; color: var(--text-muted); text-align: center;
    padding: 4px; background: rgba(86,4,46,0.1); border-radius: 8px;
    margin-bottom: 8px;
  }
</style>
</head>

// ===== 本地存储 =====
function getScores() {
  try { return JSON.parse(localStorage.getItem('wc2026_v2') || '{}'); } catch { return {}; }
}
function saveScore(matchId, homeScore, awayScore) {
  const scores = getScores();
  scores[matchId] = { h: homeScore, a: awayScore };
  localStorage.setItem('wc2026_v2', JSON.stringify(scores));
}
function getScore(matchId) { return getScores()[matchId] || null; }

// ===== Tab 切换 =====
let currentTab = 'groups';
function switchTab(tab) {
  currentTab = tab;
  const tabs = ['groups','schedule','standings','knockout','info'];
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', tabs[i]===tab));
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', tabs[i]===tab));
  renderContent(tab);
}

function renderContent(tab) {
  const el = document.getElementById('content');
  switch(tab) {
    case 'groups': el.innerHTML = renderGroups(); break;
    case 'schedule': el.innerHTML = renderSchedule(); break;
    case 'standings': el.innerHTML = renderStandings(); break;
    case 'knockout': el.innerHTML = renderKnockout(); break;
    case 'info': el.innerHTML = renderInfo(); break;
  }
  bindInputs();
}

// ===== 小组赛视图 =====
function renderGroups() {
  let html = '<div class="tz-hint">🕐 所有时间为北京时间（CST）· 点击比分框输入预测</div>';

// ===== 积分榜 =====
function renderStandings() {
  let html = '';
  Object.keys(GROUPS).forEach(gk => {
    const g = GROUPS[gk];
    const matches = ALL_MATCHES.filter(m => m.g === gk);
    const standings = g.teams.map(code => ({
      code, ...T[code],
      played:0, won:0, drawn:0, lost:0, gf:0, ga:0, gd:0, pts:0
    }));
    const idx = {};
    standings.forEach((s,i) => idx[s.code] = i);
    matches.forEach(m => {
      const sc = getScore(m.id);
      if (sc && sc.h !== '' && sc.a !== '') {
        const hs = parseInt(sc.h), as = parseInt(sc.a);
        const hi = idx[m.home], ai = idx[m.away];
        standings[hi].played++; standings[ai].played++;
        standings[hi].gf += hs; standings[hi].ga += as;
        standings[ai].gf += as; standings[ai].ga += hs;
        if (hs > as) { standings[hi].won++; standings[hi].pts+=3; standings[ai].lost++; }
        else if (hs < as) { standings[ai].won++; standings[ai].pts+=3; standings[hi].lost++; }
        else { standings[hi].drawn++; standings[ai].drawn++; standings[hi].pts++; standings[ai].pts++; }
      }
    });
    standings.forEach(s => s.gd = s.gf - s.ga);
    standings.sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);

    html += `<div class="group-card">
      <div class="group-header">
        <span class="group-label">${g.name}</span>
        <span class="group-teams">${g.teams.map(c => T[c].name).join(' · ')}</span>
      </div>
      <table class="standings-table">
        <thead><tr>
          <th style="width:18px">#</th><th style="text-align:left">球队</th>
          <th style="width:22px">赛</th><th style="width:22px">胜</th>
          <th style="width:22px">平</th><th style="width:22px">负</th>
          <th style="width:28px">净胜</th><th style="width:28px">积分</th>
        </tr></thead><tbody>`;
    standings.forEach((s,i) => {
      const pc = i<2 ? `pos-${i+1}` : `pos-${i+1}`;
      const ql = i===2 ? 'qualify-line' : '';
      html += `<tr class="${ql}">
        <td><span class="pos-badge ${pc}">${i+1}</span></td>
        <td><div class="standings-team"><span class="name">${s.name}</span></div></td>
        <td>${s.played}</td><td>${s.won}</td><td>${s.drawn}</td><td>${s.lost}</td>
        <td style="color:${s.gd>0?'var(--green)':s.gd<0?'var(--red)':'var(--text-muted)'}">${s.gd>0?'+':''}${s.gd}</td>
        <td style="font-weight:700;color:var(--accent)">${s.pts}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  });
  return html;
}

// ===== 事件绑定 =====
function bindInputs() {
  document.querySelectorAll('.score-input, .bracket-score').forEach(input => {
    input.addEventListener('change', function() {
      const mid = this.dataset.match;
      const side = this.dataset.side;
      const val = this.value === '' ? '' : this.value;
      const ex = getScore(mid) || {};
      if (side === 'h') ex.h = val; else ex.a = val;
      saveScore(mid, ex.h, ex.a);
      this.classList.toggle('has-value', val !== '');
      showToast('比分已保存 ✓');
    });
    input.addEventListener('focus', function() {
      this.setAttribute('data-old', this.value); this.value = '';
    });
    input.addEventListener('blur', function() {
      if (this.value === '') this.value = this.getAttribute('data-old') || '';
    });
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 1200);
}

// ===== API 英文名 → 队伍代码映射 =====
const API_NAME_MAP = {
  'Mexico':'MEX','South Africa':'RSA','South Korea':'KOR','Czech Republic':'CZE',
  'Canada':'CAN','Bosnia and Herzegovina':'BIH','Qatar':'QAT','Switzerland':'SUI',
  'Brazil':'BRA','Morocco':'MAR','Haiti':'HAI','Scotland':'SCO',
  'United States':'USA','Paraguay':'PAR','Australia':'AUS','Turkey':'TUR',
  'Germany':'GER','Curaçao':'CUW','Ivory Coast':'CIV','Ecuador':'ECU',
  'Netherlands':'NED','Japan':'JPN','Sweden':'SWE','Tunisia':'TUN',
  'Belgium':'BEL','Egypt':'EGY','Iran':'IRN','New Zealand':'NZL',
  'Spain':'ESP','Cape Verde':'CPV','Saudi Arabia':'KSA','Uruguay':'URU',
  'France':'FRA','Senegal':'SEN','Iraq':'IRQ','Norway':'NOR',
  'Argentina':'ARG','Algeria':'ALG','Austria':'AUT','Jordan':'JOR',
  'Portugal':'POR','Democratic Republic of the Congo':'COD','Uzbekistan':'UZB','Colombia':'COL',
  'England':'ENG','Croatia':'CRO','Ghana':'GHA','Panama':'PAN'
};

// ===== 自动获取实时比分 =====
const API_URL = 'https://worldcup26.ir/get/games';
let API_FINISHED = {};  // 从 API 获取的已完赛比赛 ID 集合

async function fetchLiveScores() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  showToast('正在获取实时比分...');

  try {
    const resp = await fetch(API_URL);
    if (!resp.ok) throw new Error('API 返回 ' + resp.status);
    const data = await resp.json();
    const games = data.games || [];

    let updated = 0;
    let newFinished = {};

    games.forEach(g => {
      // 只处理已完赛的小组赛（type=group）
      if (g.finished !== 'TRUE' || g.type !== 'group') return;

      const homeCode = API_NAME_MAP[g.home_team_name_en];
      const awayCode = API_NAME_MAP[g.away_team_name_en];
      if (!homeCode || !awayCode) return;

      // 在 ALL_MATCHES 中查找对应比赛（匹配双方队伍和小组）
      const match = ALL_MATCHES.find(m =>
        m.g === g.group &&
        ((m.home === homeCode && m.away === awayCode) ||
         (m.home === awayCode && m.away === homeCode))
      );
      if (!match) return;

      const homeScore = parseInt(g.home_score);
      const awayScore = parseInt(g.away_score);
      if (isNaN(homeScore) || isNaN(awayScore)) return;

      // 检查 API 返回的主客队是否与本地一致，不一致则交换比分
      const existing = getScore(match.id);
      const isHomeMatch = (match.home === homeCode);

      const finalH = isHomeMatch ? homeScore : awayScore;
      const finalA = isHomeMatch ? awayScore : homeScore;

      // 存储到 localStorage（API 数据优先）
      const oldH = existing ? existing.h : '';
      const oldA = existing ? existing.a : '';
      if (String(finalH) !== String(oldH) || String(finalA) !== String(oldA)) {
        saveScore(match.id, String(finalH), String(finalA));
        updated++;
      }

      // 记录已完赛状态
      newFinished[match.id] = true;
    });

    API_FINISHED = newFinished;

    // 同时处理淘汰赛（type=r32/r16/qf/sf/third/final）
    const koTypeMap = { 'r32':0, 'r16':1, 'qf':2, 'sf':3, 'third':4, 'final':5 };
    games.forEach(g => {
      if (g.finished !== 'TRUE' || g.type === 'group') return;
      // 淘汰赛暂时不做映射，因为淘汰赛数据结构是 TBD
    });

    if (updated > 0) {
      showToast(`✅ 已更新 ${updated} 场比赛结果`);
      // 重新渲染当前页面
      renderContent(currentTab);
    } else {
      // 检查是否有任何已完赛的比赛
      const finishedCount = games.filter(g => g.finished === 'TRUE' && g.type === 'group').length;
      if (finishedCount > 0) {
        showToast('✅ 比分已是最新');
      } else {
        showToast('暂无已完赛的比赛');
      }
    }

  } catch(e) {
    console.error('获取比分失败:', e);
    showToast('❌ 获取失败，请稍后再试');
  }

  btn.classList.remove('loading');
}

// 刷新按钮
async function refreshScores() {
  await fetchLiveScores();
}

// ===== 自动刷新定时器 =====
let _autoRefreshTimer = null;

function startAutoRefresh() {
  // 每 60 秒自动刷新一次
  if (_autoRefreshTimer) clearInterval(_autoRefreshTimer);
  _autoRefreshTimer = setInterval(() => {
    fetchLiveScores();
  }, 60000);
}

document.addEventListener('DOMContentLoaded', () => {
  renderContent('groups');
  // 页面加载时自动获取一次比分
  fetchLiveScores();
  // 启动自动刷新
  startAutoRefresh();
});
</script>
